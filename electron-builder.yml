appId: com.ytdownload.app
productName: YT Download
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
protocols:
  - name: YT Download
    schemes:
      - ytdl
mac:
  icon: resources/icon.icns
  category: public.app-category.utilities
  target:
    - dmg
    - zip
win:
  icon: resources/icon.png
  target:
    - nsis
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
