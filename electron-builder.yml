appId: com.ytdownload.app
productName: V-Download
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
extraResources:
  - from: extension
    to: extension
    filter:
      - "**/*"
protocols:
  - name: V-Download
    schemes:
      - ytdl
mac:
  icon: resources/icon.icns
  category: public.app-category.utilities
  target:
    - dmg
    - zip
win:
  icon: resources/icon.png
  target:
    - nsis
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
